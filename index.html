    .entry-detail-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a8a29e;
      font-weight: 700;
      margin-bottom: 6px;

    .entry-detail-text {
      font-size: 13px;
      line-height: 1.65;
      color: #57534e;

    .entry-etymology {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #f0eeed;
    }
    .entry-etymology-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a8a29e;
      font-weight: 700;
      margin-bottom: 5px;

    .entry-etymology-text {
      font-size: 13px;
      line-height: 1.65;
      color: #78716c;
      font-style: italic;

    .entry-etymology-link {
      font-size: 13px;
      color: #9f1239;
      font-weight: 500;
      text-decoration: none;

      border: 2px dashed #e7e5e4;
      border-radius: 14px;
      padding: 52px 24px;
      text-align: center;
      color: #a8a29e;
      font-size: 14px;

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .sidebar-card {
      background: white;
      border-radius: 16px;
      border: 1px solid #e7e5e4;
      padding: 24px;

    .sidebar-card-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .sidebar-card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px;
      font-weight: 600;
      color: #1c1917;
    }
    .sidebar-card-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 14px;
      line-height: 1.78;
      color: #57534e;
    }

    /* dark analysis card */
    .analysis-card {
      border-radius: 16px;
      border: 1px solid #44403c;
      padding: 24px;
      background: linear-gradient(145deg, #1c1917 0%, #292524 60%, #1c1917 100%);
      color: white;
    }
    .analysis-card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px;
      font-weight: 600;
      margin: 12px 0 14px;
    }
    .analysis-card-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 14px;
      line-height: 1.78;
      color: #d6d3d1;
    }
    .analysis-footer {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: white;
      font-weight: 500;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 4px;
      font-size: 13px;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid #e7e5e4;
      padding: 28px;
      text-align: center;
    }
    footer p {
      font-size: 13px;
      color: #a8a29e;
    }
  </style>
</head>
